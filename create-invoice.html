<!DOCTYPE html>
<html>
<head>
  <title>Invoice Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: #f4f6f9;
      display: flex;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: #1e3a8a;
      color: white;
      position: fixed;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background: #2563eb;
    }

    /* ================= MAIN ================= */
    .main {
      margin-left: 260px;
      padding: 20px;
      width: 100%;
    }

    /* ================= CARD ================= */
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 15px;
      color: #1e3a8a;
    }

    /* ================= FORM ================= */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    /* ================= TABLE ================= */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #1e3a8a;
      color: white;
    }

  </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
  <h2>IMS Panel</h2>
  <a href="#">Dashboard</a>
  <a href="#">Groups</a>
  <a href="#">Chains</a>
  <a href="#">Brands</a>
  <a href="#">Zones</a>
  <a href="#">Estimates</a>
  <a href="#" style="background:#2563eb;">Invoices</a>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

  <!-- CREATE INVOICE -->
  <div class="card">
    <h2>Create Invoice</h2>

    <div class="grid">
      <input id="estimated_id" placeholder="Estimate ID">
      <input id="chain_id" placeholder="Chain ID">
      <input id="service_details" placeholder="Service Details">

      <input id="qty" type="number" placeholder="Quantity">
      <input id="cost_per_qty" type="number" placeholder="Cost Per Qty">
      <input id="balance" type="number" placeholder="Balance">

      <input id="date_of_service" type="date">
      <input id="delivery_details" placeholder="Delivery Details">
      <input id="email_id" placeholder="Email">
    </div>

    <button onclick="createInvoice()">Save Invoice</button>
  </div>

  <!-- INVOICE TABLE -->
  <div class="card">
    <h2>Invoice List</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Invoice No</th>
          <th>Estimate</th>
          <th>Chain</th>
          <th>Service</th>
          <th>Qty</th>
          <th>Cost</th>
          <th>Total</th>
          <th>Balance</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody id="tableData"></tbody>
    </table>

  </div>

</div>

<script>

const API = "http://localhost:5000/invoices";

// ================= CREATE =================
function createInvoice() {

  const qty = parseFloat(document.getElementById("qty").value);
  const cost = parseFloat(document.getElementById("cost_per_qty").value);

  const data = {
    estimated_id: document.getElementById("estimated_id").value,
    chain_id: document.getElementById("chain_id").value,
    service_details: document.getElementById("service_details").value,
    qty: qty,
    cost_per_qty: cost,
    amount_payable: qty * cost,
    balance: document.getElementById("balance").value,
    date_of_service: document.getElementById("date_of_service").value,
    delivery_details: document.getElementById("delivery_details").value,
    email_id: document.getElementById("email_id").value
  };

  fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if(res.success){
      alert("Invoice Created: " + res.invoice_no);
      loadInvoices();
    } else {
      alert("Error creating invoice");
    }
  });
}

// ================= LOAD =================
function loadInvoices() {
  fetch(API)
    .then(res => res.json())
    .then(data => {

      let rows = "";

      data.forEach(i => {
        rows += `
          <tr>
            <td>${i.id}</td>
            <td>${i.invoice_no}</td>
            <td>${i.estimated_id}</td>
            <td>${i.chain_id}</td>
            <td>${i.service_details}</td>
            <td>${i.qty}</td>
            <td>${i.cost_per_qty}</td>
            <td>${i.amount_payable}</td>
            <td>${i.balance}</td>
            <td>${i.email_id}</td>
          </tr>
        `;
      });

      document.getElementById("tableData").innerHTML = rows;
    });
}

loadInvoices();

</script>

</body>
</html>
