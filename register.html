<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - MIS System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #2563eb, #60a5fa);
    }
    .card {
      border-radius: 15px;
    }
  </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 350px;">
    
    <h3 class="text-center mb-3">Register</h3>

    <input id="name" class="form-control mb-2" placeholder="Full Name">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">

    <select id="role" class="form-control mb-3">
      <option value="USER">User</option>
      <option value="ADMIN">Admin</option>
    </select>

    <button class="btn btn-primary w-100" onclick="register()">Register</button>

    <p class="text-center mt-3">
      Already have account? <a href="login.html">Login</a>
    </p>

  </div>
</div>

<script>

function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  // Validation
  if (!name || !email || !password) {
    alert("Please fill all fields");
    return;
  }

  // Get existing users
  let users = JSON.parse(localStorage.getItem("users")) || [];

  // Check if user already exists
  const exists = users.find(u => u.email === email);
  if (exists) {
    alert("User already registered!");
    return;
  }

  // Save user
  const newUser = { name, email, password, role };
  users.push(newUser);

  localStorage.setItem("users", JSON.stringify(users));

  alert("Registration Successful ✅");

  // Redirect to login
  window.location.href = "login.html";
}

</script>

</body>
</html>
