<!DOCTYPE html>
<html>
<head>
  <title>Manage Estimate</title>
  <style>
    body{margin:0;font-family:Arial;background:#f5f5f5;}
    .sidebar{width:200px;background:#1e40af;color:white;position:fixed;height:100%;padding:20px;}
    .sidebar a{display:block;color:white;text-decoration:none;margin:10px 0;}
    .sidebar a.active{background:#2563eb;padding:5px;border-radius:5px;}
    .main{margin-left:220px;padding:20px;}

    input,select,textarea{width:100%;padding:8px;margin-top:5px;}
    .btn{padding:8px 12px;border:none;border-radius:5px;color:white;cursor:pointer;margin-top:10px;}
    .add{background:green;} .edit{background:orange;} .delete{background:red;}

    table{width:100%;border-collapse:collapse;margin-top:20px;background:white;}
    th,td{border:1px solid #ccc;padding:10px;text-align:center;}
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Invoice</h3>
  <a href="#">Dashboard</a>
  <a href="manage-estimates.html" class="active">Manage Estimate</a>
  <a href="manage-invoices.html">Manage Invoices</a>
</div>

<div class="main">
  <h2>Manage Estimate</h2>

  <button class="btn add" onclick="save()">Save Estimate</button>

  <table>
    <thead>
      <tr>
        <th>Sr</th>
        <th>Group</th>
        <th>Chain</th>
        <th>Service</th>
        <th>Qty</th>
        <th>Total</th>
        <th>Invoice</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
const API = "http://localhost:5000";
let estimatesData = [];

// LOAD DATA
async function load(){
  const res = await fetch(API+"/estimates");
  estimatesData = await res.json();
  showData(estimatesData);
}

// SHOW TABLE
function showData(data){
  let t = document.getElementById("table");
  t.innerHTML = "";

  data.forEach((x,i)=>{
    t.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${x.group_name}</td>
        <td>${x.chain_name}</td>
        <td>${x.service_details}</td>
        <td>${x.total_quantity}</td>
        <td>${x.total_amount}</td>

        <td>
          <button class="btn add" onclick="createInvoice(${x.estimate_id})">
            Generate Invoice
          </button>
        </td>

        <td>
          <button class="btn delete" onclick="del(${x.estimate_id})">
            Delete
          </button>
        </td>
      </tr>
    `;
  });
}

// GENERATE INVOICE
async function createInvoice(id){
  if(!confirm("Generate invoice?")) return;

  const res = await fetch(API + "/invoices/" + id, { method:"POST" });
  const data = await res.json();

  alert("Invoice Created: " + data.invoice_no);

  window.location.href = "manage-invoices.html";
}

// DELETE
async function del(id){
  await fetch(API+"/estimates/"+id+"/delete",{method:"PATCH"});
  load();
}

load();
</script>

</body>
</html>
