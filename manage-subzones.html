<!DOCTYPE html>
<html>
<head>
  <title>Manage Subzones</title>

  <style>
    body{margin:0;font-family:Arial;background:#f5f5f5;}

    .sidebar{
      width:200px;
      background:#1e40af;
      color:white;
      position:fixed;
      height:100%;
      padding:20px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      margin:10px 0;
      padding:6px;
      border-radius:5px;
    }

    .sidebar a.active{background:#2563eb;}

    .main{
      margin-left:220px;
      padding:20px;
    }

    input,select{
      padding:6px;
      margin:5px;
    }

    button{
      padding:6px 10px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .add{background:#2563eb;color:white;}
    .delete{background:red;color:white;}
    .edit{background:green;color:white;}

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      margin-top:20px;
    }

    th,td{
      border:1px solid #ddd;
      padding:10px;
      text-align:center;
    }

    th{background:#f1f5f9;}
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Invoice</h3>
  <a href="index.html">Dashboard</a>
  <a href="manage-change.html">Chains</a>
  <a href="manage-brands.html">Brands</a>
  <a class="active">Subzones</a>
</div>

<div class="main">

  <h2>Manage Subzones</h2>

  <!-- FORM -->
  <input type="text" id="name" placeholder="Subzone Name">

  <select id="zoneSelect">
    <option value="">Select Zone</option>
  </select>

  <button class="add" onclick="saveSubzone()">Add</button>
  <button class="delete" onclick="cancelEdit()">Cancel</button>

  <!-- FILTER -->
  <h3>Filter by Zone</h3>

  <select id="filterZone" onchange="filterData()">
    <option value="">All Zones</option>
  </select>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Sr</th>
        <th>Zone</th>
        <th>Subzone</th>
        <th>Edit</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

</div>

<script>

const API = "http://localhost:5000";

let zones = [];
let subzones = [];
let editId = null;

// LOAD DATA
async function loadData(){
  try{

    zones = await fetch(API+"/zones").then(r=>r.json());
    subzones = await fetch(API+"/subzones").then(r=>r.json());

    loadDropdowns();
    renderTable(subzones);

  } catch(err){
    console.log(err);
    alert("Server not running");
  }
}

// DROPDOWNS
function loadDropdowns(){

  let zoneSelect = document.getElementById("zoneSelect");
  let filterZone = document.getElementById("filterZone");

  zoneSelect.innerHTML = `<option value="">Select Zone</option>`;
  filterZone.innerHTML = `<option value="">All Zones</option>`;

  zones.forEach(z=>{
    zoneSelect.innerHTML += `<option value="${z.zone_id}">${z.zone_name}</option>`;
    filterZone.innerHTML += `<option value="${z.zone_id}">${z.zone_name}</option>`;
  });
}

// TABLE
function renderTable(data){

  let t = document.getElementById("table");
  t.innerHTML = "";

  if(data.length === 0){
    t.innerHTML = "<tr><td colspan='5'>No Data</td></tr>";
    return;
  }

  data.forEach((x,i)=>{
    t.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${x.zone_name}</td>
        <td>${x.subzone_name}</td>
        <td>
          <button class="edit" onclick="editSubzone(${x.subzone_id}, '${x.subzone_name}', ${x.zone_id})">Edit</button>
        </td>
        <td>
          <button class="delete" onclick="deleteSubzone(${x.subzone_id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

// EDIT
function editSubzone(id,name,zone_id){
  document.getElementById("name").value = name;
  document.getElementById("zoneSelect").value = zone_id;
  editId = id;
}

// CANCEL
function cancelEdit(){
  editId = null;
  document.getElementById("name").value = "";
  document.getElementById("zoneSelect").value = "";
}

// SAVE
async function saveSubzone(){

  let name = document.getElementById("name").value;
  let zone_id = document.getElementById("zoneSelect").value;

  if(!name || !zone_id){
    alert("Fill all fields");
    return;
  }

  if(editId){

    await fetch(API+"/subzones/"+editId,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        subzone_name:name,
        zone_id:Number(zone_id)
      })
    });

  } else {

    await fetch(API+"/subzones",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        subzone_name:name,
        zone_id:Number(zone_id)
      })
    });
  }

  cancelEdit();
  loadData();
}

// DELETE
async function deleteSubzone(id){
  if(!confirm("Delete?")) return;
  await fetch(API+"/subzones/"+id+"/delete",{method:"PATCH"});
  loadData();
}

// FILTER
function filterData(){
  let val = document.getElementById("filterZone").value;

  if(!val){
    renderTable(subzones);
  } else {
    renderTable(subzones.filter(x=>x.zone_id == val));
  }
}

loadData();

</script>

</body>
</html>
