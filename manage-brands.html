<!DOCTYPE html>
<html>
<head>
  <title>Manage Brands</title>

  <style>
    body{font-family:Arial; display:flex; margin:0; background:#f5f5f5;}
    .sidebar{width:200px;background:#fff;padding:20px;border-right:1px solid #ccc;height:100vh;}
    .sidebar a{display:block;margin:10px 0;text-decoration:none;color:#007bff;}
    .sidebar a.active{font-weight:bold;}
    .main{flex:1;padding:20px;}

    table{width:100%;border-collapse:collapse;margin-top:20px;background:white;}
    th,td{padding:10px;text-align:center;border:1px solid #ccc;}

    .btn{padding:5px 10px;border:none;border-radius:5px;cursor:pointer;}
    .btn.add{background:green;color:white;}
    .btn.edit{background:orange;color:white;}
    .btn.delete{background:red;color:white;}

    select,input{padding:6px;margin:5px;}
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Invoice</h3>
  <a href="index.html">Dashboard</a>
  <a href="add-group.html">Groups</a>
  <a href="manage-change.html">Chains</a>
  <a class="active">Brands</a>
</div>

<div class="main">

  <h2>Manage Brands</h2>

  <!-- ADD FORM -->
  <input id="brandName" placeholder="Brand Name">

  <select id="chainSelect"></select>

  <button class="btn add" onclick="addBrand()">Add Brand</button>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Sr</th>
        <th>Company</th>
        <th>Brand</th>
        <th>Edit</th>
        <th>Delete</th>
      </tr>
    </thead>

    <tbody id="brandTable"></tbody>
  </table>

</div>

<script>

const API = "http://localhost:5000";

let chains = [];
let brands = [];

// LOAD DATA
async function loadData(){
  try{
    const chainRes = await fetch(API+"/chains");
    chains = await chainRes.json();

    const brandRes = await fetch(API+"/brands");
    brands = await brandRes.json();

    loadDropdown();
    renderTable();

  } catch(err){
    console.log(err);
    alert("❌ Server not running");
  }
}

// DROPDOWN
function loadDropdown(){
  let select = document.getElementById("chainSelect");
  select.innerHTML = `<option value="">Select Company</option>`;

  chains.forEach(c=>{
    select.innerHTML += `
      <option value="${c.chain_id}">
        ${c.company_name}
      </option>`;
  });
}

// TABLE
function renderTable(){
  let t = document.getElementById("brandTable");
  t.innerHTML = "";

  if(brands.length === 0){
    t.innerHTML = "<tr><td colspan='5'>No Data</td></tr>";
    return;
  }

  brands.forEach((b,i)=>{
    t.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${b.company_name}</td>
        <td>${b.brand_name}</td>
        <td>
          <button class="btn edit" onclick="editBrand(${b.brand_id})">Edit</button>
        </td>
        <td>
          <button class="btn delete" onclick="deleteBrand(${b.brand_id})">Delete</button>
        </td>
      </tr>
    `;
  });
}

// ✅ ADD BRAND
async function addBrand(){
  let brand_name = document.getElementById("brandName").value.trim();
  let chain_id = document.getElementById("chainSelect").value;

  if(!brand_name || !chain_id){
    alert("⚠️ Fill all fields");
    return;
  }

  try{
    const res = await fetch(API+"/brands",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        brand_name,
        chain_id:Number(chain_id)
      })
    });

    const data = await res.json();
    console.log(data);

    document.getElementById("brandName").value = "";
    loadData();

  }catch(err){
    console.log(err);
  }
}

// ✅ EDIT BRAND (FIXED)
async function editBrand(id){

  let brand = brands.find(b => b.brand_id == id);

  let newName = prompt("Enter Brand Name", brand.brand_name);
  if(!newName) return;

  let newChain = prompt("Enter Chain ID", brand.chain_id);
  if(!newChain) return;

  try{
    const res = await fetch(API+"/brands/"+id,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        brand_name:newName,
        chain_id:Number(newChain)
      })
    });

    const data = await res.json();
    console.log(data);

    alert("✅ Updated Successfully");
    loadData();

  } catch(err){
    console.log(err);
    alert("❌ Update Failed");
  }
}

// ✅ DELETE BRAND (FIXED)
async function deleteBrand(id){

  if(!confirm("Delete this brand?")) return;

  try{
    const res = await fetch(API+"/brands/"+id+"/delete",{
      method:"PATCH"
    });

    const data = await res.json();
    console.log(data);

    if(!res.ok){
      alert("❌ " + data.message);
      return;
    }

    alert("✅ Deleted Successfully");
    loadData();

  } catch(err){
    console.log(err);
    alert("❌ Server Error");
  }
}
loadData();

</script>

</body>
</html>
